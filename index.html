<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="出走前チェック">
<meta name="theme-color" content="#F7F8F9">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">
<title>出走前チェックリスト</title>
<style>
:root{
  --navy:#16222E;
  --bg:#F7F8F9;
  --red:#B03028;
  --green:#1E8A4C;
  --gray:#66707A;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
  background:var(--bg);
  color:var(--navy);
  overflow:hidden;
  overscroll-behavior:none;
  touch-action:manipulation;
  -webkit-user-select:none;user-select:none;-webkit-touch-callout:none;
  transition:background-color .25s;
}
button{font:inherit;cursor:pointer;background:none;color:inherit;}

#app{
  position:fixed;inset:0;
  display:flex;flex-direction:column;
  padding:calc(env(safe-area-inset-top) + 14px)
          calc(env(safe-area-inset-right) + 18px)
          calc(env(safe-area-inset-bottom) + 18px)
          calc(env(safe-area-inset-left) + 18px);
}

/* ヘッダー: 進捗バー + N/7 + 最初から */
#progressTrack{height:6px;border-radius:3px;background:rgba(102,112,122,.22);overflow:hidden;}
#progressFill{height:100%;width:0;border-radius:3px;background:var(--green);transition:width .18s ease-out,background-color .25s;}
#headerRow{display:flex;align-items:center;justify-content:space-between;margin-top:12px;}
#counter{font-size:1.15rem;font-weight:700;color:var(--gray);font-variant-numeric:tabular-nums;letter-spacing:.04em;}
#resetBtn{min-height:56px;padding:12px 20px;font-size:1.2rem;font-weight:700;color:var(--gray);border:2px solid rgba(102,112,122,.45);border-radius:14px;}

/* 中央: フェーズ名 / 番号 / 手順 / 補足
   チェックボタンが縦の空きスペースをすべて使って広がるレイアウト */
main{flex:1;min-height:0;display:flex;flex-direction:column;align-items:center;text-align:center;}
#stepBox{flex:1;min-height:0;width:100%;max-width:560px;display:flex;flex-direction:column;}
/* フェーズ名と番号はコンパクトにして、チェックボタンに画面を最大限使う */
#phase{font-size:1.1rem;font-weight:700;color:var(--green);letter-spacing:.2em;margin-bottom:2px;}
#num{font-size:clamp(1.8rem,7vw,2.4rem);font-weight:800;line-height:1.05;font-variant-numeric:tabular-nums;}
/* 各項目 = チェックボックス付きの大きなボタン。
   flex:1 で縦の空きスペースを等分し、常に最大サイズ・全項目同じ大きさになる */
#text{flex:1;min-height:0;display:flex;flex-direction:column;gap:14px;margin:12px 0;width:100%;}
/* .item = タップ判定(縦スペースを等分したスロット全体)。
   .card = 見た目(コンパクト)。判定は広く、見た目は離して押し分けやすく */
.item{flex:1;min-height:104px;display:flex;flex-direction:column;justify-content:center;
  width:100%;background:none;border:none;padding:5px 0;}
.item .card{flex:1;display:flex;align-items:center;gap:18px;width:100%;min-height:92px;padding:14px 22px;
  border:2.5px solid rgba(102,112,122,.35);border-radius:22px;background:#fff;
  font-size:clamp(1.5rem,6.4vw,2rem);font-weight:700;line-height:1.3;text-align:left;color:var(--navy);}
.item .box{flex:0 0 auto;width:56px;height:56px;border-radius:50%;border:3.5px solid rgba(102,112,122,.5);
  display:flex;align-items:center;justify-content:center;font-size:2rem;font-weight:800;color:#fff;}
.item .label{flex:1;overflow-wrap:anywhere;}
.item.done .card{border-color:var(--green);background:rgba(30,138,76,.08);}
.item.done .box{background:var(--green);border-color:var(--green);}
body.final .item .card{background:rgba(255,255,255,.14);border-color:rgba(255,255,255,.55);color:#fff;}
body.final .item.done .card{background:rgba(255,255,255,.28);border-color:#fff;}
body.final .item.done .box{background:#fff;border-color:#fff;color:var(--red);}
#sub{font-size:1.3rem;font-weight:600;color:var(--gray);line-height:1.5;margin-top:14px;}
/* 次のスティントへ: 最終ページの右上(最初からの位置)に表示。チェック項目から離して誤タップを防ぐ */
#nextStintBtn{display:none;min-height:56px;padding:12px 20px;border:none;border-radius:14px;background:#fff;color:var(--red);font-size:1.2rem;font-weight:800;box-shadow:0 4px 14px rgba(0,0,0,.18);}
#rcBtn{display:none;margin-top:26px;padding:18px 34px;border:none;border-radius:16px;background:var(--green);color:#fff;font-size:1.35rem;font-weight:800;box-shadow:0 4px 14px rgba(30,138,76,.35);}

/* フッター: 戻る(全幅)。チェック項目との間に緩衝地帯を設けて誤タップを防ぐ */
footer{display:flex;margin-top:32px;}
#backBtn{flex:2;min-height:80px;padding:18px 28px;font-size:1.6rem;font-weight:700;color:var(--gray);border:2px solid rgba(102,112,122,.45);border-radius:18px;}
#backBtn:disabled{opacity:.35;cursor:default;}

/* 最終項目「出発!」= 全画面赤 */
body.final{background:var(--red);color:#fff;}
body.final #counter,
body.final #phase,
body.final #num,
body.final #text{color:#fff;}
body.final #progressTrack{background:rgba(255,255,255,.32);}
body.final #progressFill{background:#fff;}
body.final #backBtn{color:#fff;border-color:rgba(255,255,255,.6);}
/* 最終画面ではリセットは「次のスティントへ」に一本化。同じ働きの「最初から」は隠す */
body.final #resetBtn{display:none;}
body.final #nextStintBtn{display:inline-block;}

/* リセット確認の全画面2択。ボタンが画面を半分ずつ使う */
#confirmOverlay{position:fixed;inset:0;z-index:20;display:none;flex-direction:column;gap:30px;
  background:var(--bg);color:var(--navy);
  padding:calc(env(safe-area-inset-top) + 24px)
          calc(env(safe-area-inset-right) + 20px)
          calc(env(safe-area-inset-bottom) + 20px)
          calc(env(safe-area-inset-left) + 20px);}
#confirmOverlay.show{display:flex;}
#confirmTitle{font-size:clamp(1.5rem,6.5vw,2rem);font-weight:800;text-align:center;line-height:1.4;white-space:pre-line;}
#confirmYes,#confirmNo{flex:1;border-radius:26px;font-size:clamp(1.6rem,7vw,2.2rem);font-weight:800;}
#confirmYes{background:var(--red);color:#fff;border:none;}
#confirmNo{background:#fff;color:var(--navy);border:3px solid rgba(102,112,122,.45);}

/* タップ確認の緑フラッシュ */
#flash{position:fixed;inset:0;background:var(--green);opacity:0;pointer-events:none;z-index:10;}
#flash.on{animation:flashfade .32s ease-out;}
@keyframes flashfade{0%{opacity:.5}100%{opacity:0}}

/* ステップ切り替えの小さな動き */
.swap{animation:swapin .16s ease-out;}
@keyframes swapin{from{opacity:.3;transform:translateY(8px);}to{opacity:1;transform:none;}}
@media (prefers-reduced-motion: reduce){
  .swap{animation:none;}
  #flash.on{animation-duration:.15s;}
}
</style>
</head>
<body>
<div id="app">
  <header>
    <div id="progressTrack"><div id="progressFill"></div></div>
    <div id="headerRow">
      <div id="counter">1 / 7</div>
      <button id="resetBtn" type="button">最初から</button>
      <button id="nextStintBtn" type="button">次のスティントへ</button>
    </div>
  </header>

  <main aria-live="polite">
    <div id="stepBox">
      <div id="phase"></div>
      <div id="num"></div>
      <div id="text"></div>
      <div id="sub"></div>
      <button id="rcBtn" type="button">RaceChronoを開く</button>
    </div>
  </main>

  <footer>
    <button id="backBtn" type="button">戻る</button>
  </footer>
</div>
<div id="flash"></div>

<!-- リセット確認: 全画面・巨大2択(車内でも押し間違えない) -->
<div id="confirmOverlay">
  <div id="confirmTitle"></div>
  <button id="confirmYes" type="button">はい、1ページ目に戻す</button>
  <button id="confirmNo" type="button">やめる</button>
</div>

<script>
"use strict";

/* ステップデータ(2026-07-15 確認項目は独立ステップとして大きく表示する) */
const STEPS=[
  {phase:"車の設定", text:"エンジン始動\nエアコンを最大に設定\n風向を確認"},
  {phase:"車の設定", text:"制御OFFの専用ボタンを押す\nオーディオをOFF", sub:"ABS以外すべてOFF。エンジン音を聞くため"},
  {phase:"着座",     text:"シートベルトが車体の外にはみ出していないか確認\nハーネスの腰ベルトを締める\nシート位置を合わせる", sub:"肩ベルトはHANS装着後"},
  {phase:"装備",     text:"耐火マスクをかぶる\nHANSを装着"},
  {phase:"装備",     text:"肩ベルトを装着\n4点ベルトがHANSにはまっているか確認"},
  {phase:"装備",     text:"ヘルメットをかぶる\nHANSクリップを装着\nミラーを合わせる"},
  {phase:"出発",     text:"窓ガラスを開ける\n走行券を取り出す\nタップでRaceChrono起動して出発!"}
];

/* 現在ステップとチェック状態を保存し、次回開いたとき続きから再開
   (localStorageが使えない環境=プレビュ等では従来どおりメモリのみ) */
const STORE_KEY="checklist_step";
const CHECK_KEY="checklist_checked";
function loadStep(){
  try{
    const v=parseInt(localStorage.getItem(STORE_KEY),10);
    if(Number.isInteger(v)&&v>=0&&v<STEPS.length)return v;
  }catch(e){}
  return 0;
}
function saveStep(){
  try{localStorage.setItem(STORE_KEY,String(i));}catch(e){}
}
let i=loadStep();

function itemsOf(step){return step.text.split("\n");}
function freshChecks(){return itemsOf(STEPS[i]).map(()=>false);}
function loadChecks(){
  try{
    const a=JSON.parse(localStorage.getItem(CHECK_KEY));
    /* 項目数が一致し、かつ未完了のときだけ復元(全部✓の状態は復元しない=安全側) */
    if(Array.isArray(a)&&a.length===itemsOf(STEPS[i]).length&&a.some(v=>!v))return a.map(Boolean);
  }catch(e){}
  return freshChecks();
}
function saveChecks(){
  try{localStorage.setItem(CHECK_KEY,JSON.stringify(checked));}catch(e){}
}
let checked=loadChecks();

const $=id=>document.getElementById(id);

/* 触れた瞬間(pointerdown)に反応させる。クリック判定だと指が少し
   滑っただけでドラッグ扱いになり押下が無効化されるため。
   PointerEvent非対応環境ではclickにフォールバック */
function onPress(el,fn){
  const type=window.PointerEvent?"pointerdown":"click";
  el.addEventListener(type,ev=>{
    if(ev.pointerType==="mouse"&&ev.button!==0)return;
    ev.stopPropagation();
    ev.preventDefault();
    fn(ev);
  });
}
const counterEl=$("counter"), fillEl=$("progressFill"),
      phaseEl=$("phase"), numEl=$("num"), textEl=$("text"), subEl=$("sub"),
      stepBox=$("stepBox"), backBtn=$("backBtn"), resetBtn=$("resetBtn"),
      nextStintBtn=$("nextStintBtn"), rcBtn=$("rcBtn"),
      flashEl=$("flash"), appEl=$("app");

function render(animate){
  const s=STEPS[i], n=STEPS.length, last=(i===n-1);
  counterEl.textContent=(i+1)+" / "+n;
  fillEl.style.width=((i+1)/n*100)+"%";
  phaseEl.textContent=s.phase;
  numEl.textContent=i+1;
  /* 各項目をチェックボックス付きボタンとして描画 */
  textEl.textContent="";
  itemsOf(s).forEach((line,idx)=>{
    const btn=document.createElement("button");
    btn.type="button";
    btn.className="item"+(checked[idx]?" done":"");
    const box=document.createElement("span");
    box.className="box";
    box.textContent=checked[idx]?"✓":"";
    const label=document.createElement("span");
    label.className="label";
    label.textContent=line;
    const card=document.createElement("span");
    card.className="card";
    card.append(box,label);
    btn.append(card);
    onPress(btn,()=>toggleItem(idx));
    textEl.appendChild(btn);
  });
  if(s.sub){subEl.textContent=s.sub;subEl.style.display="";}
  else{subEl.style.display="none";}
  rcBtn.style.display=s.openRaceChrono?"inline-block":"none";
  backBtn.disabled=(i===0); /* 1番目は戻る先がないので薄く表示(非表示にはしない) */
  document.body.classList.toggle("final",last);
  saveStep();
  if(animate){
    stepBox.classList.remove("swap");
    void stepBox.offsetWidth;
    stepBox.classList.add("swap");
  }
}

/* タップ確認: 緑フラッシュ + 振動(対応端末のみ) */
function confirmFx(){
  flashEl.classList.remove("on");
  void flashEl.offsetWidth;
  flashEl.classList.add("on");
  if(navigator.vibrate){try{navigator.vibrate(25);}catch(e){}}
}

/* 項目タップ=チェックの切り替え(もう一度押せば解除できる)。
   全項目チェックで少し間を置いて次ページへ自動遷移。
   最終ページは全チェックでRaceChronoを起動 */
let advanceTimer=null;
function cancelAdvance(){
  if(advanceTimer){clearTimeout(advanceTimer);advanceTimer=null;}
}
function toggleItem(idx){
  checked[idx]=!checked[idx];
  saveChecks();
  if(navigator.vibrate){try{navigator.vibrate(20);}catch(e){}}
  render(false);
  cancelAdvance();
  if(checked.every(Boolean)){
    /* 最後の✓を目で確認できるよう0.8秒おいて次ページへ */
    advanceTimer=setTimeout(()=>{advanceTimer=null;completePage();},800);
  }
}
function completePage(){
  if(i>=STEPS.length-1){openRaceChrono();return;}
  i++;
  checked=freshChecks();
  saveChecks();
  confirmFx();
  render(true);
}
/* 戻る/リセットは保留中の自動遷移タイマーを必ず破棄する
   (全チェック直後の待ち時間中に押されても誤って進まないように) */
function prev(){if(i>0){cancelAdvance();i--;checked=freshChecks();saveChecks();render(true);}}
function resetAll(){cancelAdvance();i=0;checked=freshChecks();saveChecks();render(true);}

onPress(backBtn,()=>prev());

/* 誤操作防止: リセット系ボタンは全画面の巨大2択で確認する。
   小さいダイアログは車内で押せないため使わない */
const confirmOverlay=$("confirmOverlay"), confirmTitle=$("confirmTitle"),
      confirmYes=$("confirmYes"), confirmNo=$("confirmNo");
function askReset(title){
  confirmTitle.textContent=title;
  confirmOverlay.classList.add("show");
}
onPress(confirmYes,()=>{
  confirmOverlay.classList.remove("show");
  resetAll();
});
onPress(confirmNo,()=>{
  confirmOverlay.classList.remove("show");
});
onPress(resetBtn,()=>askReset("1ページ目に戻しますか?"));
/* 次のスティントへ: 最終ページ=全チェック完了後なので確認なしで即リセット */
onPress(nextStintBtn,()=>resetAll());

/* RaceChrono起動: iOSショートカット「RaceChrono」
   (アクション: Appを開く → RaceChrono)経由で開く。
   racechrono:// を直接開くとRaceChronoの「インポート」画面が
   出てしまうため使わない。事前にこのショートカットを作成しておくこと。 */
const RC_SHORTCUT_URL="shortcuts://run-shortcut?name="+encodeURIComponent("RaceChrono");
function openRaceChrono(){
  location.href=RC_SHORTCUT_URL;
}
rcBtn.addEventListener("click",e=>{e.stopPropagation();openRaceChrono();});

/* Wake Lock: 対応時は画面消灯を抑止。復帰時に再取得 */
let wakeLock=null;
async function requestWakeLock(){
  if(!("wakeLock" in navigator))return;
  try{wakeLock=await navigator.wakeLock.request("screen");}catch(e){}
}
document.addEventListener("visibilitychange",()=>{
  if(document.visibilityState==="visible")requestWakeLock();
});
window.addEventListener("pointerdown",()=>requestWakeLock(),{once:true});
requestWakeLock();

/* 誤操作対策: ピンチ・ダブルタップズームを抑止 */
document.addEventListener("gesturestart",e=>e.preventDefault());
window.addEventListener("dblclick",e=>e.preventDefault());

/* オフライン対応: Service Worker登録(ホスティング環境でのみ有効。ローカルやプレビューでは黙って無視される) */
if("serviceWorker" in navigator){
  window.addEventListener("load",()=>{
    navigator.serviceWorker.register("./sw.js").catch(()=>{});
  });
}

render(false);
</script>
</body>
</html>
