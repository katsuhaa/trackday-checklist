<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="出走前チェック">
<meta name="theme-color" content="#F7F8F9">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">
<title>走行日チェックリスト</title>
<style>
:root{
  --navy:#16222E;
  --bg:#F7F8F9;
  --red:#B03028;
  --green:#1E8A4C;
  --gray:#66707A;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
  background:var(--bg);
  color:var(--navy);
  overflow:hidden;
  overscroll-behavior:none;
  touch-action:manipulation;
  -webkit-user-select:none;user-select:none;-webkit-touch-callout:none;
  transition:background-color .25s;
}
button{font:inherit;cursor:pointer;background:none;color:inherit;}
strong{font-weight:800;}

/* ===== 起動メニュー: 走行前チェック / 出走前チェック(車内) ===== */
#menu{
  position:fixed;inset:0;display:flex;flex-direction:column;gap:18px;
  padding:calc(env(safe-area-inset-top) + 28px)
          calc(env(safe-area-inset-right) + 20px)
          calc(env(safe-area-inset-bottom) + 24px)
          calc(env(safe-area-inset-left) + 20px);
}
#menuTitle{font-size:clamp(1.5rem,6.5vw,2rem);font-weight:800;text-align:center;line-height:1.3;flex:0 0 auto;}
.menuBtn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;
  border:none;border-radius:26px;color:#fff;box-shadow:0 6px 18px rgba(0,0,0,.15);}
#toPre{background:var(--navy);}
#toApp{background:var(--green);}
.mBig{font-size:clamp(1.9rem,8.5vw,2.5rem);font-weight:800;}
.mSub{font-size:1.05rem;font-weight:600;opacity:.9;padding:0 10px;text-align:center;line-height:1.4;}

/* ≡メニュー ボタン(各画面から戻る) */
.menuLink{font-size:1rem;font-weight:700;border-radius:12px;padding:10px 12px;
  border:2px solid rgba(102,112,122,.45);color:var(--gray);}

/* ===== 出走前チェック(車内・既存) ===== */
#app{
  position:fixed;inset:0;display:none;flex-direction:column;
  padding:calc(env(safe-area-inset-top) + 14px)
          calc(env(safe-area-inset-right) + 18px)
          calc(env(safe-area-inset-bottom) + 18px)
          calc(env(safe-area-inset-left) + 18px);
}
#progressTrack{height:6px;border-radius:3px;background:rgba(102,112,122,.22);overflow:hidden;}
#progressFill{height:100%;width:0;border-radius:3px;background:var(--green);transition:width .18s ease-out,background-color .25s;}
#headerRow{display:flex;align-items:center;gap:10px;margin-top:12px;}
#counter{flex:1;text-align:center;font-size:1.15rem;font-weight:700;color:var(--gray);font-variant-numeric:tabular-nums;letter-spacing:.04em;}
#resetBtn{min-height:56px;padding:12px 20px;font-size:1.2rem;font-weight:700;color:var(--gray);border:2px solid rgba(102,112,122,.45);border-radius:14px;}

main{flex:1;min-height:0;display:flex;flex-direction:column;align-items:center;text-align:center;}
#stepBox{flex:1;min-height:0;width:100%;max-width:560px;display:flex;flex-direction:column;}
#phase{font-size:1.1rem;font-weight:700;color:var(--green);letter-spacing:.2em;margin-bottom:2px;}
#num{font-size:clamp(1.8rem,7vw,2.4rem);font-weight:800;line-height:1.05;font-variant-numeric:tabular-nums;}
#text{flex:1;min-height:0;display:flex;flex-direction:column;gap:14px;margin:12px 0;width:100%;}
.item{flex:1;min-height:104px;display:flex;flex-direction:column;justify-content:center;
  width:100%;background:none;border:none;padding:5px 0;}
.item .card{flex:1;display:flex;align-items:center;gap:18px;width:100%;min-height:92px;padding:14px 22px;
  border:2.5px solid rgba(102,112,122,.35);border-radius:22px;background:#fff;
  font-size:clamp(1.5rem,6.4vw,2rem);font-weight:700;line-height:1.3;text-align:left;color:var(--navy);}
.item .box{flex:0 0 auto;width:56px;height:56px;border-radius:50%;border:3.5px solid rgba(102,112,122,.5);
  display:flex;align-items:center;justify-content:center;font-size:2rem;font-weight:800;color:#fff;}
.item .label{flex:1;overflow-wrap:anywhere;}
.item.done .card{border-color:var(--green);background:rgba(30,138,76,.08);}
.item.done .box{background:var(--green);border-color:var(--green);}
body.final #text{justify-content:center;gap:30px;}
.finalLine{font-size:clamp(1.7rem,7.5vw,2.3rem);font-weight:800;line-height:1.35;color:#fff;text-align:center;}
#sub{font-size:1.3rem;font-weight:600;color:var(--gray);line-height:1.5;margin-top:14px;}
#nextStintBtn{display:none;min-height:56px;padding:12px 20px;border:none;border-radius:14px;background:#fff;color:var(--red);font-size:1.2rem;font-weight:800;box-shadow:0 4px 14px rgba(0,0,0,.18);}
#rcBtn{display:none;margin-top:26px;padding:18px 34px;border:none;border-radius:16px;background:var(--green);color:#fff;font-size:1.35rem;font-weight:800;box-shadow:0 4px 14px rgba(30,138,76,.35);}

footer{display:flex;margin-top:32px;}
#backBtn{flex:2;min-height:80px;padding:18px 28px;font-size:1.6rem;font-weight:700;color:var(--gray);border:2px solid rgba(102,112,122,.45);border-radius:18px;}
#backBtn:disabled{opacity:.35;cursor:default;}

body.final{background:var(--red);color:#fff;}
body.final #counter,
body.final #phase,
body.final #num,
body.final #text{color:#fff;}
body.final #progressTrack{background:rgba(255,255,255,.32);}
body.final #progressFill{background:#fff;}
body.final #backBtn{color:#fff;border-color:rgba(255,255,255,.6);}
body.final #toMenuApp{color:#fff;border-color:rgba(255,255,255,.6);}
body.final #resetBtn{display:none;}
body.final #nextStintBtn{display:inline-block;}

/* リセット確認の全画面2択 */
#confirmOverlay{position:fixed;inset:0;z-index:20;display:none;flex-direction:column;gap:30px;
  background:var(--bg);color:var(--navy);
  padding:calc(env(safe-area-inset-top) + 24px)
          calc(env(safe-area-inset-right) + 20px)
          calc(env(safe-area-inset-bottom) + 20px)
          calc(env(safe-area-inset-left) + 20px);}
#confirmOverlay.show{display:flex;}
#confirmTitle{font-size:clamp(1.5rem,6.5vw,2rem);font-weight:800;text-align:center;line-height:1.4;white-space:pre-line;}
#confirmYes,#confirmNo{flex:1;border-radius:26px;font-size:clamp(1.6rem,7vw,2.2rem);font-weight:800;}
#confirmYes{background:var(--red);color:#fff;border:none;}
#confirmNo{background:#fff;color:var(--navy);border:3px solid rgba(102,112,122,.45);}

body.advancing{background:#E4F3E9;}

#flash{position:fixed;inset:0;background:var(--green);opacity:0;pointer-events:none;z-index:10;}
#flash.on{animation:flashfade .32s ease-out;}
@keyframes flashfade{0%{opacity:.5}100%{opacity:0}}
.swap{animation:swapin .16s ease-out;}
@keyframes swapin{from{opacity:.3;transform:translateY(8px);}to{opacity:1;transform:none;}}
@media (prefers-reduced-motion: reduce){
  .swap{animation:none;}
  #flash.on{animation-duration:.15s;}
}

/* ===== 走行前チェック(スクロール式・車外で使う) ===== */
#pre{position:fixed;inset:0;background:var(--bg);display:none;flex-direction:column;}
.preBar{display:flex;align-items:center;gap:12px;flex:0 0 auto;
  background:var(--navy);color:#fff;
  padding:calc(env(safe-area-inset-top) + 12px)
          calc(env(safe-area-inset-right) + 16px) 12px
          calc(env(safe-area-inset-left) + 16px);}
.preBar .menuLink{border-color:rgba(255,255,255,.55);color:#fff;}
.preBarTitle{font-size:1.3rem;font-weight:800;}
.preBody{flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding:16px calc(env(safe-area-inset-right) + 16px)
          calc(env(safe-area-inset-bottom) + 48px)
          calc(env(safe-area-inset-left) + 16px);}
.preTitle{font-size:1.45rem;font-weight:800;line-height:1.35;}
.preSubtitle{font-size:1.05rem;font-weight:700;color:var(--gray);margin:4px 0 4px;}
.preH{font-size:1.25rem;font-weight:800;color:var(--green);margin:24px 0 12px;
  padding-bottom:6px;border-bottom:2px solid rgba(30,138,76,.3);}
.setCard{background:#fff;border:2px solid rgba(102,112,122,.25);border-radius:14px;padding:4px 14px;margin-top:8px;}
.setRow{display:flex;justify-content:space-between;gap:14px;padding:11px 0;
  border-bottom:1px solid rgba(102,112,122,.16);font-size:1.02rem;line-height:1.4;}
.setRow:last-child{border-bottom:none;}
.setRow .k{color:var(--gray);font-weight:600;flex:1;}
.setRow .v{font-weight:700;text-align:right;flex:1;}
.note{background:#FFF6E5;border:2px solid #F0C36D;border-radius:12px;padding:12px 14px;margin-top:12px;
  font-size:1.05rem;line-height:1.55;font-weight:600;}
.prow{display:flex;align-items:flex-start;gap:14px;width:100%;min-height:66px;padding:14px;
  border:2px solid rgba(102,112,122,.3);border-radius:14px;background:#fff;margin-bottom:10px;
  font-size:1.15rem;font-weight:600;line-height:1.45;text-align:left;color:var(--navy);}
.prow .pbox{flex:0 0 auto;width:36px;height:36px;border-radius:50%;border:2.5px solid rgba(102,112,122,.5);
  display:flex;align-items:center;justify-content:center;font-size:1.3rem;font-weight:800;color:#fff;margin-top:1px;}
.prow .plabel{flex:1;overflow-wrap:anywhere;}
.prow.pdone{border-color:var(--green);background:rgba(30,138,76,.08);}
.prow.pdone .pbox{background:var(--green);border-color:var(--green);}
.plink{display:inline-block;margin-top:8px;color:var(--green);font-weight:800;
  text-decoration:underline;font-size:1.05rem;}
.refCard{background:#fff;border:2px solid rgba(102,112,122,.25);border-radius:14px;
  padding:14px 16px;margin-top:10px;font-size:1.05rem;line-height:1.6;}
.refCard .rItem{margin:8px 0;padding-left:16px;position:relative;}
.refCard .rItem::before{content:"・";position:absolute;left:0;color:var(--gray);}
.clearBtn{width:100%;min-height:60px;margin-top:26px;border:2px solid rgba(176,48,40,.5);
  border-radius:14px;color:var(--red);font-size:1.15rem;font-weight:700;background:#fff;}
</style>
</head>
<body>

<!-- 起動メニュー -->
<div id="menu">
  <div id="menuTitle">走行日チェックリスト</div>
  <button id="toPre" class="menuBtn" type="button">
    <span class="mBig">走行前チェック</span>
    <span class="mSub">前日〜コースイン前の準備・空気圧・走り方</span>
  </button>
  <button id="toApp" class="menuBtn" type="button">
    <span class="mBig">出走前チェック</span>
    <span class="mSub">乗車後〜コースイン直前(車内で使う)</span>
  </button>
</div>

<!-- 出走前チェック(車内) -->
<div id="app">
  <header>
    <div id="progressTrack"><div id="progressFill"></div></div>
    <div id="headerRow">
      <button id="toMenuApp" class="menuLink" type="button">≡ メニュー</button>
      <div id="counter">1 / 7</div>
      <button id="resetBtn" type="button">最初から</button>
      <button id="nextStintBtn" type="button">次のスティントへ</button>
    </div>
  </header>

  <main aria-live="polite">
    <div id="stepBox">
      <div id="phase"></div>
      <div id="num"></div>
      <div id="text"></div>
      <div id="sub"></div>
      <button id="rcBtn" type="button">RaceChronoを開く</button>
    </div>
  </main>

  <footer>
    <button id="backBtn" type="button">戻る</button>
  </footer>
</div>

<!-- 走行前チェック(スクロール式) -->
<div id="pre">
  <div class="preBar">
    <button id="toMenuPre" class="menuLink" type="button">≡ メニュー</button>
    <div class="preBarTitle">走行前チェック</div>
  </div>
  <div class="preBody" id="preBody"></div>
</div>

<div id="flash"></div>

<!-- 確認: 全画面・巨大2択 -->
<div id="confirmOverlay">
  <div id="confirmTitle"></div>
  <button id="confirmYes" type="button">はい</button>
  <button id="confirmNo" type="button">やめる</button>
</div>

<script>
"use strict";

const $=id=>document.getElementById(id);

/* 触れた瞬間(pointerdown)に反応させる。クリック判定だと指が少し
   滑っただけでドラッグ扱いになり押下が無効化されるため。
   PointerEvent非対応環境ではclickにフォールバック */
function onPress(el,fn){
  const type=window.PointerEvent?"pointerdown":"click";
  el.addEventListener(type,ev=>{
    if(ev.pointerType==="mouse"&&ev.button!==0)return;
    ev.stopPropagation();
    ev.preventDefault();
    fn(ev);
  });
}

/* **強調** をそのまま <strong> に変換して安全に描画する */
function withEmph(text){
  const frag=document.createDocumentFragment();
  text.split(/\*\*/).forEach((part,idx)=>{
    if(idx%2===1){const s=document.createElement("strong");s.textContent=part;frag.appendChild(s);}
    else frag.appendChild(document.createTextNode(part));
  });
  return frag;
}

/* ===================== 画面切り替え ===================== */
const menuEl=$("menu"), appEl=$("app"), preEl=$("pre");
function showScreen(name){
  confirmOverlay.classList.remove("show");confirmAction=null;
  menuEl.style.display=(name==="menu")?"flex":"none";
  appEl.style.display =(name==="app") ?"flex":"none";
  preEl.style.display =(name==="pre") ?"flex":"none";
  if(name!=="app")document.body.classList.remove("final","advancing");
  if(name==="app")render(false);
  if(name==="pre"){renderPre();$("preBody").scrollTop=0;}
}

/* ===================== 出走前チェック(車内) ===================== */
const STEPS=[
  {phase:"車の設定", text:"エンジン始動\nエアコンを最大に設定\n風向を確認"},
  {phase:"車の設定", text:"制御OFFの専用ボタンを押す\nオーディオをOFF", sub:"ABS以外すべてOFF。エンジン音を聞くため"},
  {phase:"着座",     text:"シートベルトが車体の外にはみ出していないか確認\nハーネスの腰ベルトを締める\nシート位置を合わせる", sub:"肩ベルトはHANS装着後"},
  {phase:"装備",     text:"耐火マスクをかぶる\nHANSを装着"},
  {phase:"装備",     text:"肩ベルトを装着\n4点ベルトがHANSにはまっているか確認"},
  {phase:"装備",     text:"ヘルメットをかぶる\nHANSクリップを装着\nミラーを合わせる"},
  {phase:"出発",     text:"窓ガラスを開ける\n走行券を取り出す\nタップでRaceChrono起動して出発!"}
];

const STORE_KEY="checklist_step";
const CHECK_KEY="checklist_checked";
function loadStep(){
  try{
    const v=parseInt(localStorage.getItem(STORE_KEY),10);
    if(Number.isInteger(v)&&v>=0&&v<STEPS.length)return v;
  }catch(e){}
  return 0;
}
function saveStep(){try{localStorage.setItem(STORE_KEY,String(i));}catch(e){}}
let i=loadStep();

function itemsOf(step){return step.text.split("\n");}
function freshChecks(){return itemsOf(STEPS[i]).map(()=>false);}
function loadChecks(){
  try{
    const a=JSON.parse(localStorage.getItem(CHECK_KEY));
    if(Array.isArray(a)&&a.length===itemsOf(STEPS[i]).length&&a.some(v=>!v))return a.map(Boolean);
  }catch(e){}
  return freshChecks();
}
function saveChecks(){try{localStorage.setItem(CHECK_KEY,JSON.stringify(checked));}catch(e){}}
let checked=loadChecks();

const counterEl=$("counter"), fillEl=$("progressFill"),
      phaseEl=$("phase"), numEl=$("num"), textEl=$("text"), subEl=$("sub"),
      stepBox=$("stepBox"), backBtn=$("backBtn"), resetBtn=$("resetBtn"),
      nextStintBtn=$("nextStintBtn"), rcBtn=$("rcBtn"), flashEl=$("flash");

function render(animate){
  const s=STEPS[i], n=STEPS.length, last=(i===n-1);
  counterEl.textContent=(i+1)+" / "+n;
  fillEl.style.width=((i+1)/n*100)+"%";
  phaseEl.textContent=s.phase;
  numEl.textContent=i+1;
  textEl.textContent="";
  if(last){
    itemsOf(s).forEach(line=>{
      const div=document.createElement("div");
      div.className="finalLine";
      div.textContent=line;
      textEl.appendChild(div);
    });
  }else{
    itemsOf(s).forEach((line,idx)=>{
      const btn=document.createElement("button");
      btn.type="button";
      btn.className="item"+(checked[idx]?" done":"");
      const box=document.createElement("span");
      box.className="box";
      box.textContent=checked[idx]?"✓":"";
      const label=document.createElement("span");
      label.className="label";
      label.textContent=line;
      const card=document.createElement("span");
      card.className="card";
      card.append(box,label);
      btn.append(card);
      onPress(btn,()=>toggleItem(idx));
      textEl.appendChild(btn);
    });
  }
  if(s.sub){subEl.textContent=s.sub;subEl.style.display="";}
  else{subEl.style.display="none";}
  rcBtn.style.display=s.openRaceChrono?"inline-block":"none";
  backBtn.disabled=(i===0);
  document.body.classList.toggle("final",last);
  saveStep();
  if(animate){
    stepBox.classList.remove("swap");
    void stepBox.offsetWidth;
    stepBox.classList.add("swap");
  }
}

function confirmFx(){
  flashEl.classList.remove("on");
  void flashEl.offsetWidth;
  flashEl.classList.add("on");
  if(navigator.vibrate){try{navigator.vibrate(25);}catch(e){}}
}

let advanceTimer=null;
function cancelAdvance(){
  if(advanceTimer){clearTimeout(advanceTimer);advanceTimer=null;}
  document.body.classList.remove("advancing");
}
function toggleItem(idx){
  checked[idx]=!checked[idx];
  saveChecks();
  if(navigator.vibrate){try{navigator.vibrate(20);}catch(e){}}
  render(false);
  cancelAdvance();
  if(checked.every(Boolean)){
    confirmFx();
    document.body.classList.add("advancing");
    advanceTimer=setTimeout(()=>{advanceTimer=null;completePage();},800);
  }
}
function completePage(){
  document.body.classList.remove("advancing");
  if(i>=STEPS.length-1){openRaceChrono();return;}
  i++;
  checked=freshChecks();
  saveChecks();
  render(true);
}
function prev(){if(i>0){cancelAdvance();i--;checked=freshChecks();saveChecks();render(true);}}
function resetAll(){cancelAdvance();i=0;checked=freshChecks();saveChecks();render(true);}

onPress(backBtn,()=>prev());
/* 最終ページでは画面のどこをタップしてもRaceChronoを起動 */
onPress(appEl,()=>{if(i>=STEPS.length-1)openRaceChrono();});

/* 確認: 全画面の巨大2択(小さいダイアログは車内で押せないため使わない) */
const confirmOverlay=$("confirmOverlay"), confirmTitle=$("confirmTitle"),
      confirmYes=$("confirmYes"), confirmNo=$("confirmNo");
let confirmAction=null;
function askConfirm(title,yesLabel,action){
  confirmTitle.textContent=title;
  confirmYes.textContent=yesLabel;
  confirmAction=action;
  confirmOverlay.classList.add("show");
}
onPress(confirmYes,()=>{confirmOverlay.classList.remove("show");const a=confirmAction;confirmAction=null;if(a)a();});
onPress(confirmNo,()=>{confirmOverlay.classList.remove("show");confirmAction=null;});
onPress(resetBtn,()=>askConfirm("1ページ目に戻しますか?","はい、1ページ目に戻す",resetAll));
/* 次のスティントへ: 全チェック完了後の操作なので確認なしで即リセット */
onPress(nextStintBtn,()=>resetAll());

/* RaceChrono起動: iOSショートカット「RaceChrono」経由。
   racechrono:// 直接はインポート画面になるため使わない */
const RC_SHORTCUT_URL="shortcuts://run-shortcut?name="+encodeURIComponent("RaceChrono");
function openRaceChrono(){location.href=RC_SHORTCUT_URL;}
rcBtn.addEventListener("click",e=>{e.stopPropagation();openRaceChrono();});

/* ===================== 走行前チェック(スクロール式) ===================== */
const PRE_TITLE="7/19(日) 袖ヶ浦AM スポーツ走行チェックリスト";
const PRE_SUBTITLE="3本走行版";
const PRE_SET=[
  ["空気圧① 真冷間の基準(参考)","フロント 1.8 / リア 1.7"],
  ["空気圧② アクアライン到着直後にセット","**フロント 2.0 / リア 1.9**"],
  ["空気圧③ 走行中の温間目標","**フロント 2.4 / リア 2.0**"],
  ["減衰(変更なし)","**フロント 最強から5戻し / リア 最強から10戻し**"]
];
const PRE_NOTES=[
  "空気圧は②で1回だけセット → 触らず走り出す → 1本目中盤の温間実測で③に合わせる。②は「温まった分を見込んだ冷間相当」で、真冷間で1.8を入れるのと同じ空気量(到着から1時間以内の出走なら誤差なし)。冷えて下がっても足さないこと(足すと入れすぎになる)。",
  "★空気入れ必須(1本目中盤の温間合わせと、帰りの指定圧充填に使う)"
];
const PRE_SECTIONS=[
  {title:"前日(7/18 土)",items:[

const PRE_RULES={title:"走り方の約束(走行中はこれだけ守る)",items:[
  "2コーナー: 旋回中はアクセルを戻さない(踏み足すか、そのまま固定)",
  "4ヘアピン: 出口の速度優先(進入で突っ込まない)",
  "5コーナー進入: 目印で軽く1回ブレーキ → 離しながらハンドルを切り始める。毎周同じに",
  "前が詰まったら1周捨てる(無理に追わない)"
]};
const PRE_EXPLAIN={title:"今回の温間2.4について",text:"今回は終日フロント2.4で管理する。狙いは2つ: ①センターブロック端のめくれ(圧集中+熱のサイン)を進行させない ②1コーナー出口の跳ねを出さない。タイムとの関係は走行後にログを7/13と比較して判定する。当日は「跳ねが出たかどうか」だけ覚えておけばOK。"};

const PRE_KEY="predrive_checked";
let preChecks={};
try{const o=JSON.parse(localStorage.getItem(PRE_KEY));if(o&&typeof o==="object")preChecks=o;}catch(e){}
function savePreChecks(){try{localStorage.setItem(PRE_KEY,JSON.stringify(preChecks));}catch(e){}}

const preBody=$("preBody");
let preRows=[]; /* {key,el,box} リセット時の一括更新用 */
let preBuilt=false;

function makeRefCard(title,items,paragraph){
  const h=document.createElement("div");h.className="preH";h.textContent=title;preBody.appendChild(h);
  const card=document.createElement("div");card.className="refCard";
  if(items){items.forEach(t=>{const d=document.createElement("div");d.className="rItem";d.appendChild(withEmph(t));card.appendChild(d);});}
  if(paragraph){const p=document.createElement("div");p.appendChild(withEmph(paragraph));card.appendChild(p);}
  preBody.appendChild(card);
}

function renderPre(){
  if(preBuilt){refreshPre();return;}
  preBody.textContent="";

  const t=document.createElement("div");t.className="preTitle";t.textContent=PRE_TITLE;preBody.appendChild(t);
  const st=document.createElement("div");st.className="preSubtitle";st.textContent=PRE_SUBTITLE;preBody.appendChild(st);

  /* 今回のセット(参照) */
  const setH=document.createElement("div");setH.className="preH";setH.textContent="今回のセット";preBody.appendChild(setH);
  const setCard=document.createElement("div");setCard.className="setCard";
  PRE_SET.forEach(([k,v])=>{
    const row=document.createElement("div");row.className="setRow";
    const ke=document.createElement("span");ke.className="k";ke.textContent=k;
    const ve=document.createElement("span");ve.className="v";ve.appendChild(withEmph(v));
    row.append(ke,ve);setCard.appendChild(row);
  });
  preBody.appendChild(setCard);
  PRE_NOTES.forEach(n=>{const d=document.createElement("div");d.className="note";d.appendChild(withEmph(n));preBody.appendChild(d);});

  /* チェック項目セクション */
  PRE_SECTIONS.forEach((sec,si)=>{
    const h=document.createElement("div");h.className="preH";h.textContent=sec.title;preBody.appendChild(h);
    sec.items.forEach((item,ii)=>{
      const key="s"+si+"i"+ii;
      const obj=(typeof item==="string")?{t:item}:item;
      const row=document.createElement("button");row.type="button";row.className="prow";
      const box=document.createElement("span");box.className="pbox";
      const label=document.createElement("span");label.className="plabel";
      label.appendChild(withEmph(obj.t));
      if(obj.link){
        const a=document.createElement("a");a.className="plink";a.textContent=obj.link.label;
        a.href=obj.link.url;a.target="_blank";a.rel="noopener";
        a.addEventListener("pointerdown",e=>e.stopPropagation());
        a.addEventListener("click",e=>e.stopPropagation());
        label.appendChild(document.createElement("br"));
        label.appendChild(a);
      }
      row.append(box,label);
      onPress(row,()=>togglePre(key));
      preBody.appendChild(row);
      preRows.push({key:key,el:row,box:box});
    });
  });

  /* 参照ブロック */
  makeRefCard(PRE_RULES.title,PRE_RULES.items,null);
  makeRefCard(PRE_EXPLAIN.title,null,PRE_EXPLAIN.text);

  const clear=document.createElement("button");clear.type="button";clear.className="clearBtn";
  clear.textContent="チェックをすべてクリア";
  onPress(clear,()=>askConfirm("走行前チェックを\nすべてクリアしますか?","はい、クリアする",clearPre));
  preBody.appendChild(clear);

  preBuilt=true;
  refreshPre();
}
function refreshPre(){
  preRows.forEach(r=>{
    const on=!!preChecks[r.key];
    r.el.classList.toggle("pdone",on);
    r.box.textContent=on?"✓":"";
  });
}
function togglePre(key){
  if(preChecks[key])delete preChecks[key];else preChecks[key]=true;
  savePreChecks();
  if(navigator.vibrate){try{navigator.vibrate(15);}catch(e){}}
  refreshPre();
}
function clearPre(){
  preChecks={};savePreChecks();refreshPre();
}

/* ===================== メニュー配線 ===================== */
onPress($("toPre"),()=>showScreen("pre"));
onPress($("toApp"),()=>showScreen("app"));
onPress($("toMenuApp"),()=>showScreen("menu"));
onPress($("toMenuPre"),()=>showScreen("menu"));

/* ===================== 共通 ===================== */
let wakeLock=null;
async function requestWakeLock(){
  if(!("wakeLock" in navigator))return;
  try{wakeLock=await navigator.wakeLock.request("screen");}catch(e){}
}
document.addEventListener("visibilitychange",()=>{
  if(document.visibilityState==="visible")requestWakeLock();
});
window.addEventListener("pointerdown",()=>requestWakeLock(),{once:true});
requestWakeLock();

document.addEventListener("gesturestart",e=>e.preventDefault());
window.addEventListener("dblclick",e=>e.preventDefault());

if("serviceWorker" in navigator){
  window.addEventListener("load",()=>{
    navigator.serviceWorker.register("./sw.js").catch(()=>{});
  });
}

showScreen("menu");
</script>
